{% extends 'base.html' %}

{% block title %}Vocabulary | KizunaSutra{% endblock %}

{% block content %}
<main>
        <div class="container">
            <div class="page-header">
                <h1>Vocabulary</h1>
                <p>Master essential words. Click to mark as learned.</p>
            </div>
            
            <div class="search-bar">
                <input type="text" id="vocab-search" class="search-input" placeholder="Search by romaji or meaning...">
            </div>

            <div id="vocab-list" class="vocab-grid">
                <!-- Cards injected via JS -->
            </div>
        </div>
    </main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script src="{{ url_for('static', filename='js/vocabulary.js') }}"></script>
{% endblock %}
